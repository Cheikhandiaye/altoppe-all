<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AL-TOPPE — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #F4F1DE; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; text-align: center; }
    .logo { width: 80px; height: 80px; background: #1B4332; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .logo span { color: white; font-size: 2rem; font-weight: bold; }
    h1 { color: #1B4332; font-size: 1.4rem; margin-bottom: 0.75rem; }
    p { color: #555; font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .wolof { color: #2D6A4F; font-style: italic; font-size: 0.95rem; margin-bottom: 2rem; }
    button { background: #1B4332; color: white; border: none; padding: 0.875rem 2rem; border-radius: 8px; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <div class="logo"><span>A</span></div>
  <h1>Pas de connexion internet</h1>
  <p>Vérifiez votre connexion et réessayez.<br/>Vos données sont sauvegardées.</p>
  <p class="wolof">« Jërejëf ci këram bi » — Revenez quand le réseau est disponible.</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
